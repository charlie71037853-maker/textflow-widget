<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TEXTFLOW PRO</title>
  <link rel="icon" type="image/png" href="./pr-logo.png?v=3" />
  <link rel="apple-touch-icon" href="./pr-logo.png?v=3" />
  <link rel="shortcut icon" href="./pr-logo.png?v=3" />
  <style>
    :root{
      --bg:#ffffff;
      --muted:#6b7280;
      --border:#e5e7eb;
      --text:#111827;
      --accent:#111827;
      --brand:#5B52D8;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;}

    .header{max-width:1280px;margin:0 auto;padding:20px 24px 16px;display:flex;align-items:center;gap:16px;}
    .header .logo{width:56px;height:56px;flex-shrink:0;object-fit:contain;}
    .header .brand{flex:1;min-width:0}
    .header .brand h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-0.02em;}
    .header .brand .tagline{margin:2px 0 0;font-size:13px;color:var(--muted);}
    .header .cta{display:inline-block;padding:10px 18px;background:var(--accent);color:white;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap;border:0;cursor:pointer;font-family:inherit;}
    .header .cta:hover{opacity:.9}

    .wrap{max-width:1280px;margin:0 auto;padding:0 24px 16px;}
    .menu{display:flex;gap:6px;padding:6px;border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow-x:auto;flex-wrap:nowrap;}
    .menu::-webkit-scrollbar{display:none}
    .btn{flex:0 0 auto;border:0;background:transparent;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text);font-family:inherit;white-space:nowrap;transition:background .15s;}
    .btn:hover{background:#f3f4f6}
    .btn[aria-selected="true"]{background:#111827;color:white}
    .panel{border:1px solid var(--border);border-radius:12px;padding:28px 32px;min-height:320px}
    .panel h2{margin:0 0 14px;font-size:20px}
    .panel h3{margin:0 0 10px;font-size:16px}
    .muted{color:var(--muted)}
    table{border-collapse:collapse;width:100%;margin-top:10px}
    th,td{border:1px solid var(--border);padding:12px;font-size:14px}
    th{background:#f9fafb;text-align:left}
    ul,ol{margin:8px 0 0 18px}
    .faq p{margin:10px 0}
    .hr{height:1px;background:var(--border);margin:18px 0}
    a{color:var(--brand)}

    .subtabs{display:flex;gap:4px;padding:4px;background:#f9fafb;border:1px solid var(--border);border-radius:10px;margin:16px 0 20px;overflow-x:auto;flex-wrap:nowrap;}
    .subtabs::-webkit-scrollbar{display:none}
    .subbtn{flex:0 0 auto;border:0;background:transparent;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);font-family:inherit;white-space:nowrap;transition:all .15s;}
    .subbtn:hover{background:white;color:var(--text)}
    .subbtn[aria-selected="true"]{background:white;color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.06);}
    .subpanel{min-height:220px}

    .footer{max-width:1280px;margin:0 auto;padding:28px 24px 32px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;line-height:1.75;}
    .footer .cols{display:grid;grid-template-columns:1.2fr 1fr;gap:32px;}
    .footer .title{color:var(--text);font-weight:700;margin:0 0 10px;font-size:13px;letter-spacing:.02em;}
    .footer .copy{margin-top:20px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}

    @media (max-width: 820px){
      .header{flex-wrap:wrap;padding:16px}
      .header .cta{order:99;width:100%;text-align:center}
      .wrap{padding:0 16px 16px}
      .panel{padding:20px}
      .footer{padding:24px 16px;}
      .footer .cols{grid-template-columns:1fr;gap:20px}
    }
  </style>
</head>

    <img src="./pr-logo.png?v=3" alt="Pr" class="logo" onerror="this.style.display='none'" />

    function setSub(key){
      const sp = document.getElementById("subpanel");
      if (!sp) return;
      sp.innerHTML = FEATURES[key] || "";
      document.querySelectorAll(".subbtn").forEach(b=>{
        b.setAttribute("aria-selected", b.dataset.sub === key ? "true" : "false");
      });
    }

    function setTab(key){
      panel.innerHTML = TABS[key] || "";
      document.querySelectorAll(".btn").forEach(b=>{
        b.setAttribute("aria-selected", b.dataset.tab === key ? "true" : "false");
      });
      if (key === "features") {
        document.querySelectorAll(".subbtn").forEach(btn=>{
          btn.addEventListener("click", ()=> setSub(btn.dataset.sub));
        });
        setSub("insert");
      }
      if (window.innerWidth <= 820) {
        panel.scrollIntoView({behavior:"smooth", block:"start"});
      }
    }

    document.querySelectorAll(".btn").forEach(btn=>{
      btn.addEventListener("click", ()=> setTab(btn.dataset.tab));
    });

    setTab("features");
