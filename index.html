<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TEXTFLOW PRO - 탭 위젯</title>
  <style>
    :root{
      --bg:#ffffff;
      --muted:#6b7280;
      --border:#e5e7eb;
      --text:#111827;
      --accent:#111827;
    }
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;}
    .wrap{display:grid;grid-template-columns: 220px 1fr;gap:16px;max-width:1100px;margin:0 auto;padding:16px;}
    .menu{border:1px solid var(--border);border-radius:12px;padding:10px;position:sticky;top:12px;height:fit-content}
    .menu h3{margin:6px 8px 10px;font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.02em}
    .btn{display:block;width:100%;text-align:left;border:0;background:transparent;padding:10px 10px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text)}
    .btn:hover{background:#f3f4f6}
    .btn[aria-selected="true"]{background:#111827;color:white}
    .panel{border:1px solid var(--border);border-radius:12px;padding:18px;min-height:260px}
    .panel h2{margin:0 0 12px;font-size:18px}
    .muted{color:var(--muted)}
    table{border-collapse:collapse;width:100%;margin-top:10px}
    th,td{border:1px solid var(--border);padding:10px;font-size:14px}
    th{background:#f9fafb;text-align:left}
    ul{margin:8px 0 0 18px}
    .faq p{margin:10px 0}
    .hr{height:1px;background:var(--border);margin:14px 0}
    @media (max-width: 820px){
      .wrap{grid-template-columns:1fr}
      .menu{position:relative;top:auto}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="menu" aria-label="탭 메뉴">
      <h3>메뉴</h3>
      <button class="btn" role="tab" data-tab="features" aria-selected="true">주요 기능</button>
      <button class="btn" role="tab" data-tab="pricing" aria-selected="false">가격</button>
      <button class="btn" role="tab" data-tab="trial" aria-selected="false">무료 체험</button>
      <button class="btn" role="tab" data-tab="req" aria-selected="false">시스템 요구사항</button>
      <button class="btn" role="tab" data-tab="faq" aria-selected="false">자주 묻는 질문</button>
      <button class="btn" role="tab" data-tab="support" aria-selected="false">고객지원</button>
      <button class="btn" role="tab" data-tab="policies" aria-selected="false">정책/약관</button>
    </nav>

    <main class="panel" role="tabpanel" id="panel">
      <!-- 내용은 JS로 렌더 -->
    </main>
  </div>

  <script>
    const panel = document.getElementById("panel");

    const TABS = {
      features: `
        <h2>주요 기능</h2>
        <ul>
          <li>자막 자동화 — SRT 드래그앤드롭 → MOGRT 자막 일괄 삽입</li>
          <li>Whisper 음성인식 — 영상 업로드만으로 자동 자막 생성 (한국어 특화)</li>
          <li>MOGRT 스타일 팔레트 — 8개 프리셋 + 사용자 정의 스타일 저장</li>
          <li>일괄 텍스트 편집 — 전체 자막 찾기/바꾸기, 정렬 모드 4단계</li>
          <li>음성 생성 (TTS) — ElevenLabs 연동 내레이션 생성</li>
          <li>영상·이미지 소스 관리 — 프로젝트 폴더 자동 정리, 빠른 삽입</li>
        </ul>
      `,
      pricing: `
        <h2>가격</h2>
        <p class="muted">3일 무료 체험 — 이메일 입력만으로 모든 기능 사용. 카드 등록 없음.</p>
        <table>
          <thead>
            <tr><th>플랜</th><th>가격</th><th>설명</th></tr>
          </thead>
          <tbody>
            <tr><td>월간</td><td>₩9,900 / 월</td><td>매월 결제, 언제든 해지</td></tr>
            <tr><td>연간</td><td>₩79,000 / 년</td><td>2개월 무료 (월 ₩6,583)</td></tr>
            <tr><td>평생</td><td>₩149,000</td><td>1회 결제 · 평생 사용 · 무료 업데이트</td></tr>
          </tbody>
        </table>
        <p class="muted">결제수단: 신용카드 · 체크카드 · 카카오페이 · 네이버페이 · 계좌이체</p>
      `,
      trial: `
        <h2>무료 체험</h2>
        <p>이메일 한 번 입력으로 3일 무료. 카드 정보 불필요. 체험 종료 시 자동 결제 없음.</p>
      `,
      req: `
        <h2>시스템 요구사항</h2>
        <ul>
          <li>Adobe Premiere Pro 2020 (v14) 이상</li>
          <li>macOS 11 이상 / Windows 10 이상</li>
          <li>인터넷 연결 (라이선스 인증 시)</li>
        </ul>
      `,
      faq: `
        <h2>자주 묻는 질문</h2>
        <div class="faq">
          <p><b>몇 대의 컴퓨터에서 쓸 수 있나요?</b><br>1개 라이선스로 최대 2대 (맥 + 윈도우 조합 가능)</p>
          <p><b>해지하면 바로 중단되나요?</b><br>결제한 기간까지는 계속 사용 가능하며, 다음 갱신일부터 중단됩니다.</p>
          <p><b>세금계산서 발행되나요?</b><br>사업자 구매 시 발행 가능합니다. 구매 후 이메일로 요청해주세요.</p>
          <p><b>업데이트는 무료인가요?</b><br>구독 기간 또는 평생 라이선스 보유 중 모든 업데이트 무료입니다.</p>
          <p><b>환불되나요?</b><br>정책/약관 탭의 환불 정책을 참고하세요.</p>
        </div>
      `,
      support: `
        <h2>고객지원</h2>
        <p>이메일: <a href="mailto:charlie71037853@gmail.com">charlie71037853@gmail.com</a><br>응답 시간: 평일 24시간 이내</p>
      `,
      policies: `
        <h2>정책/약관</h2>
        <h3>환불 정책</h3>
        <ol>
          <li>3일 무료 체험 후 결제가 기본이므로, 이용자가 기능을 충분히 확인한 뒤 유료 결제가 진행됩니다.</li>
          <li>유료 결제 후 플러그인을 1회도 실행하지 않은 경우 결제일로부터 7일 이내 전액 환불.</li>
          <li>실행 이력이 있는 디지털 콘텐츠는 전자상거래법 제17조 제2항 제5호에 따라 청약철회가 제한됩니다.</li>
          <li>시스템 오류 또는 서비스 중대한 장애로 사용이 불가능한 경우 사유 확인 후 전액 환불.</li>
          <li>환불 요청: <a href="mailto:charlie71037853@gmail.com">charlie71037853@gmail.com</a></li>
        </ol>
        <div class="hr"></div>
        <h3>이용약관</h3>
        <p class="muted">현재 Notion 페이지의 이용약관 내용을 그대로 옮겨 넣으시면 됩니다.</p>
        <div class="hr"></div>
        <h3>개인정보처리방침</h3>
        <p class="muted">현재 Notion 페이지의 개인정보처리방침 내용을 그대로 옮겨 넣으시면 됩니다.</p>
      `
    };

    function setTab(key){
      panel.innerHTML = TABS[key] || "";
      document.querySelectorAll(".btn").forEach(b=>{
        b.setAttribute("aria-selected", b.dataset.tab === key ? "true" : "false");
      });
    }

    document.querySelectorAll(".btn").forEach(btn=>{
      btn.addEventListener("click", ()=> setTab(btn.dataset.tab));
    });

    // default
    setTab("features");
  </script>
</body>
</html>
